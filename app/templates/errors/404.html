{% extends "base.html" %}
{% block title %}404 — {{ _('Page Not Found') }}{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center"
     style="min-height:60vh; gap:1.5rem">

  <div style="font-size:5rem; line-height:1">🔍</div>

  <div>
    <h1 class="display-4 fw-bold text-warning mb-1">404</h1>
    <h2 class="h4 text-muted mb-3">{{ _('Page Not Found') }}</h2>
    <p class="text-muted mb-4" style="max-width:420px">
      {{ _('The page you are looking for does not exist or has been moved.') }}
    </p>
  </div>

  <div class="d-flex gap-2">
    <a href="{{ url_for('main.index') }}" class="btn btn-primary px-4">
      <i class="fas fa-home me-2"></i>{{ _('Dashboard') }}
    </a>
    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
      <i class="fas fa-arrow-left me-2"></i>{{ _('Go Back') }}
    </a>
  </div>

</div>
{% endblock %}
